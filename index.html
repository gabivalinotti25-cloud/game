<script>
(function () {
    // Design-ui pages are single compositions, so the whole body is editable.
    function markEditable() {
        document.body.classList.add('artifact-editable');
    }

    // Credit badge with idle-fade. Hover devices only.
    function initChromeUI() {
        if (!matchMedia('(hover: hover)').matches) return;

        var credit = document.createElement('div');
        credit.className = 'design-ui-credit';
        credit.setAttribute('aria-hidden', 'true');
        credit.innerHTML = '\u{1F49C} by ClickUp Brain';
        document.body.appendChild(credit);

        var timer = null;
        var fade = function (out) { credit.style.opacity = out ? '0' : ''; };
        fade(true);
        var show = function () {
            fade(false);
            clearTimeout(timer);
            timer = setTimeout(function () { fade(true); }, 3000);
        };
        document.addEventListener('mousemove', show);
        show();
    }

    function init() {
        markEditable();
        initChromeUI();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();

</script>

let me={id:localStorage.getItem('playerId')||crypto.randomUUID(),name:'',charId:'',isHost:false};let room={code:'',status:'waiting',currentQuestion:0};let playersData=[];let selectedChar=null;let timerInterval=null;let timerStartTime=null;let timerDuration=20;let myAnswer=-1;let questionStartTime=0;let shuffledQuestions=[];let autoReconnectAttempted=false;

function shuffleArray(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}

function shuffleQuestions(){shuffledQuestions=QUESTIONS.map(q=>{const shuffledOpts=[...q.opts];const correctIdx=q.correct;shuffleArray(shuffledOpts);const newCorrect=shuffledOpts.indexOf(q.opts[correctIdx]);return{...q,opts:shuffledOpts,correct:newCorrect}});shuffleArray(shuffledQuestions)}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function showCreate(){showScreen('create');renderCharsIn('hostChars')}
function showJoin(){showScreen('join');renderCharsIn('joinChars')}
function renderCharsIn(cid){const grid=document.getElementById(cid);grid.innerHTML=CHARS.map(c=>{const content=c.img?`<img src="${c.img}"><span class="ef" style="display:none">${c.emoji}</span>`:`<img src="" style="display:none"><span class="ef">${c.emoji}</span>`;return`<div class="char-option" data-id="${c.id}" onclick="pickChar('${c.id}','${cid}')"><div class="char-avatar" data-cid="${c.id}">${content}</div></div>`;}).join('')}
function pickChar(id,cid){selectedChar=id;document.querySelectorAll(`#${cid} .char-option`).forEach(el=>el.classList.toggle('selected',el.dataset.id===id))}
function genCode(){const ch='ABCDEFGHJKLMNPQRSTUVWXYZ';let c='';for(let i=0;i<4;i++)c+=ch[Math.floor(Math.random()*ch.length)];return c}
async function createRoom(){const name=document.getElementById('hostName').value.trim();if(!name||!selectedChar)return alert('Poné tu nombre y elegí un avatar');me.name=name;me.charId=selectedChar;me.isHost=true;room.code=genCode();localStorage.setItem('playerId',me.id);localStorage.setItem('roomCode',room.code);localStorage.setItem('playerName',name);localStorage.setItem('playerCharId',selectedChar);await sb.from('rooms').insert({code:room.code,host_id:me.id,status:'waiting',current_question:0});await sb.from('players').insert({id:me.id,room_code:room.code,name:me.name,character_id:me.charId,score:0});showScreen('waiting');document.getElementById('displayCode').textContent=room.code;document.getElementById('btnStartGame').style.display='block';subscribeToRoom()}
async function joinRoom(){const code=document.getElementById('joinCode').value.trim().toUpperCase();const name=document.getElementById('joinName').value.trim();if(!code||!name||!selectedChar)return alert('Completá todo');const{data:r}=await sb.from('rooms').select().eq('code',code).single();if(!r)return alert('Sala no encontrada');const{data:existingPlayer}=await sb.from('players').select().eq('id',me.id).eq('room_code',code).single();if(existingPlayer){me.name=existingPlayer.name;me.charId=existingPlayer.character_id;me.isHost=existingPlayer.id===r.host_id;room.code=code;room.status=r.status;room.currentQuestion=r.current_question;localStorage.setItem('roomCode',code);localStorage.setItem('playerName',me.name);localStorage.setItem('playerCharId',me.charId);subscribeToRoom();if(r.status==='playing')onNewQuestion();else if(r.status==='showing_results')onShowResults();else if(r.status==='finished')onFinished();else showScreen('waiting');document.getElementById('displayCode').textContent=code;return}if(r.status!=='waiting')return alert('El juego ya empezó');me.name=name;me.charId=selectedChar;me.isHost=false;room.code=code;localStorage.setItem('playerId',me.id);localStorage.setItem('roomCode',code);localStorage.setItem('playerName',name);localStorage.setItem('playerCharId',selectedChar);await sb.from('players').insert({id:me.id,room_code:room.code,name:me.name,character_id:me.charId,score:0});showScreen('waiting');document.getElementById('displayCode').textContent=room.code;subscribeToRoom()}
function subscribeToRoom(){sb.channel('p-'+room.code).on('postgres_changes',{event:'*',schema:'public',table:'players',filter:`room_code=eq.${room.code}`},()=>refreshPlayers()).subscribe();sb.channel('r-'+room.code).on('postgres_changes',{event:'UPDATE',schema:'public',table:'rooms',filter:`code=eq.${room.code}`},(pl)=>{const r=pl.new;room.status=r.status;room.currentQuestion=r.current_question;if(r.status==='playing')onNewQuestion();if(r.status==='showing_results')onShowResults();if(r.status==='finished')onFinished()}).subscribe();sb.channel('c-'+room.code).on('postgres_changes',{event:'INSERT',schema:'public',table:'chat',filter:`room_code=eq.${room.code}`},()=>loadChatMessages()).subscribe();refreshPlayers();loadChatMessages()}
async function refreshPlayers(){const{data}=await sb.from('players').select().eq('room_code',room.code);playersData=data||[];renderWP()}
function renderWP(){document.getElementById('waitingPlayers').innerHTML=playersData.map(p=>`<div class="player-row">${av(p.character_id,'player-avatar')}<span class="pr-name">${p.name}</span>${p.id===me.id?'<span class="pr-host">Vos</span>':''}</div>`).join('');document.getElementById('waitingText').textContent=`${playersData.length}/10 jugadores`}
async function startGame(){if(playersData.length<2)return alert('Mínimo 2');shuffleQuestions();await sb.from('rooms').update({status:'playing',current_question:0}).eq('code',room.code)}
function onNewQuestion(){myAnswer=-1;showScreen('game');const q=shuffledQuestions[room.currentQuestion];document.getElementById('qCounter').textContent=`Pregunta ${room.currentQuestion+1} / ${shuffledQuestions.length}`;document.getElementById('qSource').textContent=`📚 ${q.src}`;document.getElementById('questionText').textContent=q.q;document.getElementById('scoresBar').innerHTML=playersData.sort((a,b)=>b.score-a.score).map(p=>`<div class="score-chip">${av(p.character_id,'sc-avatar')}<span class="sc-pts">${p.score}</span></div>`).join('');document.getElementById('optionsGrid').innerHTML=q.opts.map((opt,i)=>`<button class="option-btn" onclick="answer(${i})">${opt}</button>`).join('');document.getElementById('answeredBadge').style.display='none';questionStartTime=Date.now();const fill=document.getElementById('timerFill');fill.style.transition='none';fill.style.width='100%';fill.classList.remove('danger');timerStartTime=performance.now();if(timerInterval)cancelAnimationFrame(timerInterval);function updateTimer(){const elapsed=(performance.now()-timerStartTime)/1000;const remaining=Math.max(0,timerDuration-elapsed);fill.style.width=(remaining/timerDuration*100)+'%';if(remaining<=5)fill.classList.add('danger');if(remaining<=0){cancelAnimationFrame(timerInterval);if(myAnswer===-1)answer(-1)}else{timerInterval=requestAnimationFrame(updateTimer)}};timerInterval=requestAnimationFrame(updateTimer)}
async function answer(idx){if(myAnswer!==-1)return;myAnswer=idx;if(timerInterval)cancelAnimationFrame(timerInterval);document.querySelectorAll('.option-btn').forEach((b,i)=>{b.classList.add('disabled');b.disabled=true;if(i===idx)b.classList.add('mine')});document.getElementById('answeredBadge').style.display='block';document.getElementById('answeredBadge').textContent='✓ Respuesta enviada, esperando...';const q=shuffledQuestions[room.currentQuestion];const isCorrect=idx===q.correct;const elapsed=(Date.now()-questionStartTime)/1000;const timeBonus=Math.max(0,Math.round((20-elapsed)*10));const points=isCorrect?100+timeBonus:0;try{await sb.from('players').update({last_answer:idx,score:(playersData.find(p=>p.id===me.id)?.score||0)+points,answered_at:new Date().toISOString()}).eq('id',me.id)}catch(e){console.error('Error al enviar respuesta:',e)}if(me.isHost)checkAll()}
async function checkAll(){let attempts=0;const check=async()=>{const{data}=await sb.from('players').select().eq('room_code',room.code);if(data.every(p=>p.last_answer!==-1&&p.last_answer!==null)||attempts>=25){await sb.from('rooms').update({status:'showing_results'}).eq('code',room.code)}else{attempts++;setTimeout(check,500)}};setTimeout(check,500)}
async function onShowResults(){await refreshPlayers();showScreen('results');const q=shuffledQuestions[room.currentQuestion];const myP=playersData.find(p=>p.id===me.id);const correct=myP&&myP.last_answer===q.correct;document.getElementById('resEmoji').textContent=correct?'🎉':'😵';document.getElementById('resQuestion').textContent=q.q;document.getElementById('resCorrect').textContent=`✓ ${q.opts[q.correct]}`;const sorted=[...playersData].sort((a,b)=>b.score-a.score);document.getElementById('leaderboard').innerHTML=sorted.map((p,i)=>`<div class="lb-row"><span class="lb-rank">${i===0?'👑':i+1}</span>${av(p.character_id,'player-avatar')}<span class="lb-name">${p.name}</span><span class="lb-pts">${p.score}</span>${p.last_answer===q.correct?'<span class="lb-delta">✓</span>':''}</div>`).join('');if(me.isHost){setTimeout(async()=>{const next=room.currentQuestion+1;if(next>=shuffledQuestions.length){await sb.from('rooms').update({status:'finished'}).eq('code',room.code)}else{await Promise.all(playersData.map(p=>sb.from('players').update({last_answer:-1,answered_at:null}).eq('id',p.id)));await sb.from('rooms').update({status:'playing',current_question:next}).eq('code',room.code)}},2500)}}
async function onFinished(){localStorage.removeItem('roomCode');localStorage.removeItem('playerName');localStorage.removeItem('playerCharId');await refreshPlayers();showScreen('final');const sorted=[...playersData].sort((a,b)=>b.score-a.score);const w=sorted[0];document.getElementById('finalWinner').innerHTML=`${av(w.character_id,'player-avatar-lg')}<span>${w.name} con ${w.score} pts</span>`;document.getElementById('finalBoard').innerHTML=sorted.map((p,i)=>`<div class="lb-row"><span class="lb-rank">${i===0?'👑':i+1}</span>${av(p.character_id,'player-avatar')}<span class="lb-name">${p.name}</span><span class="lb-pts">${p.score}</span></div>`).join('')}
async function sendMessage(){const input=document.getElementById('chatInput');const text=input.value.trim();if(!text||!room.code)return;input.value='';try{await sb.from('chat').insert({room_code:room.code,player_id:me.id,player_name:me.name,character_id:me.charId,message:text,created_at:new Date().toISOString()})}catch(e){console.error('Error al enviar mensaje:',e)}}
async function loadChatMessages(){try{const{data}=await sb.from('chat').select().eq('room_code',room.code).order('created_at',{ascending:true}).limit(50);renderChatMessages(data||[])}catch(e){console.error('Error al cargar mensajes:',e)}}
function renderChatMessages(messages){const container=document.getElementById('chatMessages');if(!container)return;container.innerHTML=messages.map(m=>{const player=playersData.find(p=>p.id===m.player_id);const char=player?player.character_id:m.character_id;const isMine=m.player_id===me.id;return`<div class="chat-message${isMine?' mine':''}">${av(char,'cm-avatar')}<span class="cm-name">${m.player_name}</span><span class="cm-text">${m.message}</span></div>`}).join('');container.scrollTop=container.scrollHeight}
async function tryAutoReconnect(){
  if(autoReconnectAttempted)return;
  autoReconnectAttempted=true;
  const savedCode=localStorage.getItem('roomCode');
  const savedName=localStorage.getItem('playerName');
  const savedCharId=localStorage.getItem('playerCharId');
  if(!savedCode||!savedName||!savedCharId)return;
  try{
    const{data:r}=await sb.from('rooms').select().eq('code',savedCode).single();
    if(!r){
      localStorage.removeItem('roomCode');
      localStorage.removeItem('playerName');
      localStorage.removeItem('playerCharId');
      return
    }
    const{data:existingPlayer}=await sb.from('players').select().eq('id',me.id).eq('room_code',savedCode).single();
    if(!existingPlayer){
      localStorage.removeItem('roomCode');
      localStorage.removeItem('playerName');
      localStorage.removeItem('playerCharId');
      return
    }
    me.name=existingPlayer.name;
    me.charId=existingPlayer.character_id;
    me.isHost=existingPlayer.id===r.host_id;
    room.code=savedCode;
    room.status=r.status;
    room.currentQuestion=r.current_question;
    subscribeToRoom();
    if(r.status==='playing')onNewQuestion();
    else if(r.status==='showing_results')onShowResults();
    else if(r.status==='finished')onFinished();
    else showScreen('waiting');
    document.getElementById('displayCode').textContent=savedCode
  }catch(e){
    console.error('Error al reconectar:',e);
    localStorage.removeItem('roomCode');
    localStorage.removeItem('playerName');
    localStorage.removeItem('playerCharId')
  }
}
tryAutoReconnect();
async function leaveGame(){if(!confirm('¿Seguro que querés abandonar la partida?'))return;try{await sb.from('players').delete().eq('id',me.id).eq('room_code',room.code);if(me.isHost){await sb.from('rooms').delete().eq('code',room.code)}localStorage.removeItem('roomCode');localStorage.removeItem('playerName');localStorage.removeItem('playerCharId');room={code:'',status:'waiting',currentQuestion:0};me.isHost=false;showScreen('menu')}catch(e){console.error('Error al abandonar partida:',e);alert('Error al abandonar partida')}}
</script>
